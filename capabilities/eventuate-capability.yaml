        description: entityType
        required: true
      - name: entityId
        type: string
        description: entityId
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: createsubscription
      description: Create an event subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: eventuate.createsubscription
      outputParameters:
      - type: object
